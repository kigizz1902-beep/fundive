<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKINAWA DIVE TOUR</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#1B2A4A;
    --sky2:#2D4A7A;
    --sea:#0D6B7A;
    --sea-deep:#063744;
    --sand:#F4D58D;
    --leaf:#3FA34D;
    --coral:#FF5D5D;
    --white:#FFF8E7;
    --dark:#0A0A14;
    --gold:#FFD24C;
  }
  *{ box-sizing:border-box; margin:0; padding:0; image-rendering:pixelated; }
  html,body{
    background:var(--dark);
    font-family:'DotGothic16',sans-serif;
    color:var(--white);
    overflow-x:hidden;
    user-select:none;
  }
  .pixel{ font-family:'Press Start 2P',monospace; }

  /* ===== HUD ===== */
  #hud{
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 18px;
    background:var(--dark);
    border-bottom:4px solid var(--gold);
  }
  #hud .pixel{ font-size:11px; color:var(--gold); letter-spacing:1px; }
  #coinCount{ display:flex; align-items:center; gap:8px; }
  .coin-icon{
    width:16px; height:16px; border-radius:50%;
    background:var(--gold);
    box-shadow: 0 0 0 2px var(--dark) inset;
    transition: transform .2s;
  }
  .coin-icon.pop{ animation: coinpop .4s steps(4); }
  @keyframes coinpop{ 0%{ transform:scale(1); } 40%{ transform:scale(1.6) rotate(180deg); } 100%{ transform:scale(1); } }

  /* ===== WORLD ===== */
  #world{
    position:relative;
    width:100%;
    min-height:1500px;
    background:linear-gradient(to bottom, var(--sky) 0%, var(--sky2) 14%, var(--sea) 26%, var(--sea-deep) 100%);
    padding-top:70px;
    overflow:hidden;
  }
  .cloud{ position:absolute; background:var(--white); opacity:.85; }
  .sun{ position:absolute; top:30px; right:60px; width:48px; height:48px; background:var(--gold); box-shadow: 0 0 0 6px var(--dark); }

  .waterline{
    position:absolute; left:0; right:0; top:14%;
    height:6px;
    background: repeating-linear-gradient(90deg, var(--white) 0 16px, transparent 16px 32px);
    opacity:.5;
    z-index:1;
  }

  #okinawaMap{ position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; opacity:0.13; pointer-events:none; }

  /* buoy */
  #buoy{
    position:absolute; top:120px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center;
    z-index:6;
  }
  #buoy .rope{
    width:3px; height:46px; background:var(--white); opacity:.6;
  }
  #buoy .ball{
    width:46px; height:46px; border-radius:50%;
    background:var(--coral);
    border:4px solid var(--dark);
    box-shadow: inset -6px -6px 0 rgba(0,0,0,0.18);
    animation: bobbuoy 2.4s ease-in-out infinite;
  }
  @keyframes bobbuoy{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-8px); } }
  #buoy .sign{
    margin-top:10px;
    background:var(--sand);
    border:4px solid var(--dark);
    padding:10px 14px;
    text-align:center;
    box-shadow:4px 4px 0 var(--dark);
  }
  #buoy .sign .pixel{
    font-size:11px;
    color:var(--dark);
    line-height:1.6;
    white-space:nowrap;
  }

  /* vertical path */
  #pathSvg{ position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; }

  .node{
    position:absolute;
    width:78px; height:78px;
    background:#F2D17E;
    border:5px solid var(--dark);
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    z-index:5;
    transition:transform .15s;
    left:50%;
    transform:translateX(-50%);
  }
  .node:hover{ transform:translateX(-50%) scale(1.06); }
  .node.cleared{ background:var(--leaf); }
  .node.active{ box-shadow: 0 0 0 5px var(--gold); }
  .node .num{ font-family:'Press Start 2P',monospace; font-size:18px; color:var(--dark); }
  .node .star{ position:absolute; top:-14px; right:-10px; font-size:18px; }

  .label{
    position:absolute;
    left:50%;
    font-family:'Press Start 2P',monospace;
    font-size:9px;
    color:var(--white);
    text-shadow:2px 2px 0 var(--dark);
    text-align:center;
    width:160px;
    transform:translateX(calc(-50% + 100px));
  }

  /* diver swims OUTSIDE the node, to the side */
  #player{
    position:absolute;
    width:40px; height:40px;
    z-index:10;
    transition: top .9s cubic-bezier(.4,0,.2,1), left .6s ease;
    filter: drop-shadow(2px 2px 0 var(--dark));
  }
  #player svg{ width:100%; height:100%; }
  #player.bob{ animation: bob 0.45s steps(2) infinite; }
  @keyframes bob{ 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(-6px) rotate(-4deg); } }

  .fishdeco{ position:absolute; opacity:.85; z-index:2; animation: swim 6s linear infinite; }
  @keyframes swim{ 0%{ transform:translateX(0); } 50%{ transform:translateX(34px); } 100%{ transform:translateX(0); } }

  /* ===== CONTROLS ===== */
  #controls{
    position:absolute;
    display:flex; flex-direction:column; gap:10px;
    align-items:center;
    z-index:11;
    transition: top .9s cubic-bezier(.4,0,.2,1);
  }
  .btn{
    font-family:'Press Start 2P',monospace;
    font-size:13px;
    color:var(--dark);
    background:var(--gold);
    border:4px solid var(--dark);
    padding:14px 16px;
    cursor:pointer;
    box-shadow:4px 4px 0 var(--dark);
    width:92px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .btn.icon-btn{
    font-size:22px;
    padding:14px 16px;
  }
  .btn.icon-btn svg{ width:22px; height:22px; }
  .btn:active{ transform:translate(2px,2px); box-shadow:2px 2px 0 var(--dark); }
  .btn:disabled{ background:#5a5a6a; color:#999; cursor:not-allowed; box-shadow:none; }
  #enterBtn{ background:#4EC6D4; }

  /* ===== MODAL ===== */
  #modalOverlay{
    position:fixed; inset:0; background:rgba(10,10,20,0.85);
    display:none; align-items:center; justify-content:center;
    z-index:200; padding:20px;
  }
  #modalOverlay.open{ display:flex; }
  #modalBox{
    background:var(--sand);
    border:6px solid var(--dark);
    box-shadow:8px 8px 0 var(--dark);
    max-width:480px; width:100%;
    padding:26px;
    color:var(--dark);
    position:relative;
    animation: pop .25s steps(5);
  }
  @keyframes pop{ 0%{ transform:scale(.8); opacity:0; } 100%{ transform:scale(1); opacity:1; } }
  #modalBox h2{ font-family:'Press Start 2P',monospace; font-size:15px; margin-bottom:14px; line-height:1.6; }
  #modalBox p{ font-size:15px; line-height:1.75; margin-bottom:16px; }
  #modalBox .stagetag{ display:inline-block; font-family:'Press Start 2P',monospace; font-size:10px; background:var(--coral); color:var(--white); padding:6px 10px; margin-bottom:14px; }
  #modalBox .creatures{ display:flex; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
  #modalBox .creatures span{ font-size:24px; }
  #clearBtn{ width:100%; }
  #closeX{
    position:absolute; top:10px; right:10px;
    font-family:'Press Start 2P',monospace;
    font-size:16px;
    cursor:pointer;
    background:var(--dark); color:var(--white);
    width:30px; height:30px;
    display:flex; align-items:center; justify-content:center;
  }

  #toast{
    position:fixed; top:90px; left:50%; transform:translateX(-50%) translateY(-20px);
    font-family:'Press Start 2P',monospace;
    font-size:12px;
    background:var(--leaf);
    color:var(--white);
    padding:12px 20px;
    border:4px solid var(--dark);
    opacity:0;
    transition:all .3s;
    z-index:300;
    pointer-events:none;
    text-align:center;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width:600px){
    #world{ min-height:1700px; }
    .label{ transform:translateX(calc(-50% + 85px)); font-size:8px; width:130px; }
  }
</style>
</head>
<body>

<div id="hud">
  <div class="pixel">OKINAWA DIVE TOUR</div>
  <div id="coinCount" class="pixel"><div class="coin-icon" id="coinIcon"></div><span id="coinNum">0</span> / 5</div>
  <button class="pixel" id="resetBtn" style="background:var(--coral); color:var(--white); border:3px solid var(--dark); padding:8px 12px; cursor:pointer; font-size:10px;">RESET</button>
</div>


<div id="world">
  <div class="sun"></div>
  <div class="cloud" style="top:30px; left:10%; width:70px; height:24px; border-radius:20px;"></div>
  <div class="cloud" style="top:55px; left:65%; width:90px; height:28px; border-radius:20px;"></div>
  <div class="cloud" style="top:20px; left:82%; width:50px; height:18px; border-radius:20px;"></div>
  <div class="waterline"></div>

  <svg id="okinawaMap" viewBox="0 0 600 1500" preserveAspectRatio="none">
    <path d="M300 260 C340 300, 280 340, 320 380 C360 420, 400 400, 420 450 C440 500, 400 530, 430 580 C460 630, 500 610, 490 670 C480 730, 430 740, 450 800 C470 860, 520 850, 500 920"
      stroke="#F4D58D" stroke-width="22" stroke-linecap="round" fill="none"/>
    <circle cx="180" cy="700" r="10" fill="#F4D58D"/>
    <circle cx="150" cy="760" r="7" fill="#F4D58D"/>
    <circle cx="200" cy="820" r="6" fill="#F4D58D"/>
    <circle cx="560" cy="500" r="8" fill="#F4D58D"/>
    <circle cx="540" cy="430" r="6" fill="#F4D58D"/>
  </svg>

  <svg id="pathSvg"><polyline id="pathLine" points="" fill="none" stroke="#F4D58D" stroke-width="6" stroke-dasharray="14 10" /></svg>

  <div id="buoy">
    <div class="ball"></div>
    <div class="rope"></div>
    <div class="sign">
      <div class="pixel">OKINAWA</div>
      <div class="pixel">DIVE TOUR</div>
    </div>
  </div>

  <div class="fishdeco" style="top:330px; left:12%; font-size:22px;">🐟</div>
  <div class="fishdeco" style="top:430px; left:75%; font-size:22px; animation-delay:2s;">🐠</div>
  <div class="fishdeco" style="top:560px; left:30%; font-size:22px; animation-delay:4s;">🐡</div>
  <div class="fishdeco" style="top:640px; left:60%; font-size:36px; animation-delay:1s; animation-duration:11s;">🐳</div>
  <div class="fishdeco" style="top:760px; left:10%; font-size:28px; animation-delay:3s; animation-duration:8s;">🐙</div>
  <div class="fishdeco" style="top:880px; left:78%; font-size:26px; animation-delay:2.5s; animation-duration:9s;">🐢</div>
  <div class="fishdeco" style="top:980px; left:20%; font-size:20px; animation-delay:5s;">🐟</div>
  <div class="fishdeco" style="top:1100px; left:65%; font-size:24px; animation-delay:1.5s; animation-duration:7s;">🦑</div>
  <div class="fishdeco" style="top:1250px; left:35%; font-size:30px; animation-delay:0.5s; animation-duration:10s;">🐢</div>
  <div class="fishdeco" style="top:1380px; left:70%; font-size:22px; animation-delay:3.5s;">🐠</div>

  <div id="player" class="bob"></div>
  <div id="controls">
    <button class="btn icon-btn" id="upBtn" aria-label="UP" title="UP">▲</button>
    <button class="btn" id="enterBtn">ENTER</button>
    <button class="btn icon-btn" id="downBtn" aria-label="DOWN" title="DOWN">▼</button>
  </div>
</div>

<div id="modalOverlay">
  <div id="modalBox">
    <div id="closeX">✕</div>
    <div class="stagetag" id="modalTag">EP.01</div>
    <h2 id="modalTitle"></h2>
    <div class="creatures" id="modalCreatures"></div>
    <p id="modalDesc"></p>
    <button class="btn pixel" id="clearBtn">스테이지 클리어!</button>
  </div>
</div>

<div id="toast" class="pixel"></div>

<script>
const stages = [
  { depth:'3m', title:'EP.01 — 오키나와 프리다이빙, 왜 가야 할까',
    desc:'산소통 없이 숨 하나로 들어가는 오키나와 바다. 투명한 시야와 따뜻한 수온을 만나는 시리즈의 시작.',
    creatures:['🌊','☀️'], y:330 },
  { depth:'8m', title:'EP.02 — 만날 수 있는 해양생물 총정리',
    desc:'흰동가리, 바다거북, 운 좋으면 만타가오리까지. 가장 화려한 비주얼의 회차.',
    creatures:['🐠','🐢','🦈'], y:570 },
  { depth:'15m', title:'EP.03 — 다이빙 포인트 추천',
    desc:'케라마 제도를 비롯한 대표 포인트를 난이도·시야별로 비교하는 실용 가이드.',
    creatures:['🏝️','🤿'], y:810 },
  { depth:'22m', title:'EP.04 — 언제 가야 가장 좋을까',
    desc:'6~9월 황금기와 비수기를 수온·시야·혼잡도로 비교 분석.',
    creatures:['📅','🌡️'], y:1050 },
  { depth:'30m', title:'EP.05 — 준비물 & 코스 추천',
    desc:'장비 체크리스트부터 예약 방법, 코스 추천까지. 떠날 준비를 끝내는 마지막 회차.',
    creatures:['🎒','🧭'], y:1290 }
];

let cleared = JSON.parse(sessionStorage.getItem('dq_cleared') || '[false,false,false,false,false]');
// activeIndex: 처음으로 클리어하지 않은 스테이지 (다이버가 향해 있는 곳)
function getActiveIndex(){
  const idx = cleared.findIndex(c => !c);
  return idx === -1 ? stages.length - 1 : idx;
}
let activeIndex = getActiveIndex();
let viewIndex = activeIndex; // 현재 보고 있는(모달에 띄울) 스테이지

const world = document.getElementById('world');
const player = document.getElementById('player');

function playerSvg(){
  return `<svg viewBox="0 0 16 16">
    <rect x="5" y="1" width="6" height="5" fill="#FF5D5D"/>
    <rect x="4" y="6" width="8" height="6" fill="#0D6B7A"/>
    <rect x="2" y="7" width="2" height="3" fill="#0D6B7A"/>
    <rect x="12" y="7" width="2" height="3" fill="#0D6B7A"/>
    <rect x="4" y="12" width="3" height="3" fill="#F4D58D"/>
    <rect x="9" y="12" width="3" height="3" fill="#F4D58D"/>
    <rect x="6" y="2" width="4" height="2" fill="#FFF8E7"/>
  </svg>`;
}
player.innerHTML = playerSvg();

function buildNodes(){
  stages.forEach((s, i)=>{
    const node = document.createElement('div');
    node.className = 'node' + (cleared[i] ? ' cleared' : '') + (i===activeIndex ? ' active' : '');
    node.style.top = s.y + 'px';
    node.innerHTML = `<span class="num pixel">${i+1}</span>` + (cleared[i] ? '<span class="star">⭐</span>' : '');
    node.dataset.index = i;
    node.addEventListener('click', ()=>{ selectView(i); });
    world.appendChild(node);

    const label = document.createElement('div');
    label.className = 'label pixel';
    label.style.top = (s.y + 18) + 'px';
    label.textContent = s.depth + ' STAGE';
    world.appendChild(label);
  });
  drawPath();
  placePlayer(true);
}

function drawPath(){
  const line = document.getElementById('pathLine');
  const worldWidth = world.clientWidth;
  const cx = worldWidth/2;
  const buoyBottom = 120 + 46 + 46 + 10; // 부표 하단 대략 위치
  let pts = `${cx},${buoyBottom}`;
  stages.forEach(s=>{ pts += ` ${cx},${s.y+39}`; });
  line.setAttribute('points', pts);
}

function placePlayer(immediate){
  const s = stages[activeIndex];
  const worldWidth = world.clientWidth;
  const cx = worldWidth/2;
  const sideOffset = -70; // 스테이지 버튼 왼쪽에서 헤엄
  const px = cx + sideOffset;
  if(immediate){ player.style.transition = 'none'; }
  player.style.left = px + 'px';
  player.style.top = (s.y + 18) + 'px';
  if(immediate){
    requestAnimationFrame(()=>{ player.style.transition = ''; });
  }
  placeControls(s, immediate);
}

function placeControls(s, immediate){
  const controls = document.getElementById('controls');
  const worldWidth = world.clientWidth;
  const cx = worldWidth/2;
  const navOffset = Math.min(170, worldWidth/2 - 50); // 스테이지 버튼 오른쪽 옆
  if(immediate){ controls.style.transition = 'none'; }
  controls.style.left = (cx + navOffset) + 'px';
  controls.style.top = (s.y - 14) + 'px';
  if(immediate){
    requestAnimationFrame(()=>{ controls.style.transition = ''; });
  }
}

function selectView(i){
  if(i > activeIndex){
    showToast('이전 스테이지부터 클리어하세요!');
    return;
  }
  viewIndex = i;
  openModal();
}

function openModal(){
  const s = stages[viewIndex];
  document.getElementById('modalTag').textContent = s.depth + ' STAGE';
  document.getElementById('modalTitle').textContent = s.title;
  document.getElementById('modalDesc').textContent = s.desc;
  document.getElementById('modalCreatures').innerHTML = s.creatures.map(c=>`<span>${c}</span>`).join('');
  const clearBtn = document.getElementById('clearBtn');
  if(cleared[viewIndex]){
    clearBtn.textContent = '클리어 완료!';
    clearBtn.disabled = true;
  } else if(viewIndex === activeIndex){
    clearBtn.textContent = '스테이지 클리어!';
    clearBtn.disabled = false;
  } else {
    clearBtn.textContent = '잠겨 있음';
    clearBtn.disabled = true;
  }
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}

function clearStage(){
  if(viewIndex !== activeIndex || cleared[viewIndex]) return;
  cleared[activeIndex] = true;
  sessionStorage.setItem('dq_cleared', JSON.stringify(cleared));
  rebuildNodeVisual(activeIndex);
  bumpCoin();
  activeIndex = getActiveIndex();
  viewIndex = activeIndex;
  updateActiveHighlight();
  placePlayer(false); // 다이버가 다음 깊이로 같이 내려감
  showToast('★ STAGE CLEAR! ★');
  closeModal();
}

function rebuildNodeVisual(i){
  const node = document.querySelectorAll('.node')[i];
  node.classList.add('cleared');
  node.innerHTML = `<span class="num pixel">${i+1}</span><span class="star">⭐</span>`;
}

function updateActiveHighlight(){
  document.querySelectorAll('.node').forEach((node, i)=>{
    node.classList.toggle('active', i===activeIndex);
  });
}

function bumpCoin(){
  document.getElementById('coinNum').textContent = cleared.filter(Boolean).length;
  const icon = document.getElementById('coinIcon');
  icon.classList.remove('pop');
  requestAnimationFrame(()=>{ icon.classList.add('pop'); });
}

let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 1600);
}

document.getElementById('upBtn').addEventListener('click', ()=> selectView(Math.max(0, viewIndex-1)));
document.getElementById('downBtn').addEventListener('click', ()=> selectView(Math.min(stages.length-1, viewIndex+1)));
document.getElementById('enterBtn').addEventListener('click', ()=>{ viewIndex = activeIndex; openModal(); });
document.getElementById('closeX').addEventListener('click', closeModal);
document.getElementById('clearBtn').addEventListener('click', clearStage);
document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowUp') selectView(Math.max(0, viewIndex-1));
  if(e.key === 'ArrowDown') selectView(Math.min(stages.length-1, viewIndex+1));
  if(e.key === 'Enter'){ viewIndex = activeIndex; openModal(); }
  if(e.key === 'Escape') closeModal();
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  cleared = [false,false,false,false,false];
  sessionStorage.setItem('dq_cleared', JSON.stringify(cleared));
  activeIndex = 0;
  viewIndex = 0;
  document.querySelectorAll('.node').forEach((node, i)=>{
    node.classList.remove('cleared');
    node.classList.toggle('active', i===activeIndex);
    node.innerHTML = `<span class="num pixel">${i+1}</span>`;
  });
  document.getElementById('coinNum').textContent = '0';
  placePlayer(true);
  showToast('RESET! 처음부터 다시 시작해요');
});

buildNodes();
document.getElementById('coinNum').textContent = cleared.filter(Boolean).length;
window.addEventListener('resize', ()=>{ drawPath(); placePlayer(true); });
</script>

</body>
</html>
